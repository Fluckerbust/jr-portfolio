name: Jonathan Raynes Portfolio Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: jr-portfolio/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: jr-portfolio

      - name: Build
        run: npm run build
        working-directory: jr-portfolio

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: jr-portfolio/build
